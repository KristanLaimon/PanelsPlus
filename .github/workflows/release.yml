name: Build and draft release

on:
  push:
    tags:
      - "v*.*.*-*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build zip and draft release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git fetch --force origin \
            +refs/heads/main:refs/remotes/origin/main \
            +refs/tags/*:refs/tags/*

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="$(
              gh api --paginate "repos/${GITHUB_REPOSITORY}/git/matching-refs/tags/v" \
                --jq '.[] | .ref | sub("^refs/tags/"; "")' |
                grep -E '^v[0-9]+\.[0-9]+\.[0-9]+-.+' |
                sort -V |
                tail -n 1 || true
            )"

            if [[ -z "${tag}" ]]; then
              echo "::error::No GitHub release tag matching v#.#.#-Whatever exists."
              exit 1
            fi
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-.+ ]]; then
            echo "::error::Release tags must look like v#.#.#-Whatever, for example v1.2.3-Beta."
            exit 1
          fi

          git fetch --force origin "+refs/tags/${tag}:refs/tags/${tag}"
          commit="$(git rev-list -n 1 "${tag}^{commit}")"

          if ! git merge-base --is-ancestor "${commit}" origin/main; then
            echo "::error::Tag ${tag} does not point to a commit reachable from origin/main."
            exit 1
          fi

          git checkout --force "${commit}"
          previous_tag="$(git describe --tags --abbrev=0 "${commit}^" 2>/dev/null || true)"

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${tag#v}" >> "${GITHUB_OUTPUT}"
          echo "commit=${commit}" >> "${GITHUB_OUTPUT}"
          echo "previous_tag=${previous_tag}" >> "${GITHUB_OUTPUT}"

      - name: Build plugin
        run: ./build.sh panels_plus

      - name: Package plugin
        id: package
        env:
          VERSION: ${{ steps.release.outputs.version }}
          PACKAGE_NAME: panels_plus-${{ steps.release.outputs.version }}.zip
        run: |
          set -euo pipefail

          package_name="${PACKAGE_NAME}"
          python3 - <<'PY'
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile
          import os

          package_name = os.environ["PACKAGE_NAME"]
          source_dir = Path("dist/panels_plus.koplugin")

          with ZipFile(package_name, "w", ZIP_DEFLATED) as archive:
              for path in sorted(source_dir.rglob("*")):
                  if path.is_file():
                      archive.write(path, path.relative_to("dist"))
          PY

          echo "name=${package_name}" >> "${GITHUB_OUTPUT}"
          echo "path=${package_name}" >> "${GITHUB_OUTPUT}"

      - name: Write release notes draft
        env:
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
          COMMIT: ${{ steps.release.outputs.commit }}
          PREVIOUS_TAG: ${{ steps.release.outputs.previous_tag }}
        run: |
          set -euo pipefail

          if [[ -n "${PREVIOUS_TAG}" ]]; then
            range="${PREVIOUS_TAG}..${COMMIT}"
          else
            range="${COMMIT}"
          fi

          {
            echo "Built from tag: ${TAG}"
            echo
            echo "## Commits"
            git log --format="- %h %s (%an)" "${range}"
            echo
            echo "## Authors"
            git log --format="%an" "${range}" | sort -u | sed 's/^/- /'
          } > release-notes.md

      - name: Create draft release
        id: create_release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "::error::Release ${TAG} already exists. Edit it manually or delete it before rerunning."
            exit 1
          fi

          gh release create "${TAG}" \
            --draft \
            --title "${VERSION}" \
            --notes-file release-notes.md

          release_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
          edit_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/edit/${TAG}"

          echo "release_url=${release_url}" >> "${GITHUB_OUTPUT}"
          echo "edit_url=${edit_url}" >> "${GITHUB_OUTPUT}"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          PACKAGE_PATH: ${{ steps.package.outputs.path }}
        run: |
          set -euo pipefail

          test -s "${PACKAGE_PATH}"
          gh release upload "${TAG}" "${PACKAGE_PATH}" --clobber

          if ! gh release view "${TAG}" --json assets --jq '.assets[].name' | grep -Fx "${PACKAGE_NAME}" >/dev/null; then
            echo "::error::Release asset ${PACKAGE_NAME} was not uploaded."
            exit 1
          fi

      - name: Link release editor
        env:
          TAG: ${{ steps.release.outputs.tag }}
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
          RELEASE_URL: ${{ steps.create_release.outputs.release_url }}
          EDIT_URL: ${{ steps.create_release.outputs.edit_url }}
        run: |
          set -euo pipefail

          {
            echo "## Draft release created"
            echo
            echo "- Tag: \`${TAG}\`"
            echo "- Asset: \`${PACKAGE_NAME}\`"
            echo "- Release: ${RELEASE_URL}"
            echo "- Edit before publishing: ${EDIT_URL}"
          } >> "${GITHUB_STEP_SUMMARY}"
